{% extends 'base.html' %}
{% block content %}

<h2>Edit Supplier</h2>

<div class="card">
<form method="POST">

    <!-- Supplier Name -->
    <label>Supplier Name</label>
    <input type="text" name="name"
           value="{{ supplier[1] }}" required>

    <!-- Contact -->
    <label>Contact</label>
    <input type="text" name="contact"
           value="{{ supplier[2] }}" required>

    <!-- Address -->
    <label>Address</label>
    <input type="text" name="address"
           value="{{ supplier[3] }}" required>

    <button class="edit-btn" type="submit">Update Supplier</button>

</form>
</div>

{% endblock %}
