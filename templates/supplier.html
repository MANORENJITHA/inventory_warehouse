{% extends 'base.html' %}
{% block content %}

<style>
.action-btn {
    padding: 6px 12px;
    border-radius: 5px;
    cursor: pointer;
    color: white;
    margin-right: 8px;
    text-decoration: none;
    display: inline-block;
}

/* Edit - Green */
.edit-btn {
    background-color: #28a745;
}

.edit-btn:hover {
    background-color: #218838;
}

/* Delete - Red */
.delete-btn {
    background-color: #dc3545;
}

.delete-btn:hover {
    background-color: #c82333;
}
</style>

<h2>Supplier</h2>

<div class="card">

<form method="POST">
<input name="name" placeholder="Name" required>
<input name="contact" placeholder="Contact" required>
<input name="address" placeholder="Address" required>

<br><br>

<button class="add-btn">Add Supplier</button>
</form>

</div>

<br>

<div class="card">

<table>
<tr>
<th>ID</th>
<th>Name</th>
<th>Contact</th>
<th>Address</th>
<th>Actions</th>
</tr>

{% for s in data %}
<tr>
<td>{{ s[0] }}</td>
<td>{{ s[1] }}</td>
<td>{{ s[2] }}</td>
<td>{{ s[3] }}</td>

<td>
    <!-- EDIT BUTTON -->
    <a href="{{ url_for('edit_supplier', id=s[0]) }}" 
       class="action-btn edit-btn">
        Edit
    </a>

    <!-- DELETE BUTTON -->
    <a href="{{ url_for('delete_supplier', id=s[0]) }}" 
       class="action-btn delete-btn"
       onclick="return confirm('Are you sure you want to delete this supplier?')">
        Delete
    </a>
</td>

</tr>
{% endfor %}

</table>

</div>

{% endblock %}
