{% extends 'base.html' %}
{% block content %}

<style>
.action-btn {
    padding: 6px 12px;
    border-radius: 5px;
    cursor: pointer;
    color: white;
    margin-right: 8px;
    text-decoration: none;
    display: inline-block;
}

/* Edit - Green */
.edit-btn {
    background-color: #28a745;
}

.edit-btn:hover {
    background-color: #218838;
}

/* Delete - Red */
.delete-btn {
    background-color: #dc3545;
}

.delete-btn:hover {
    background-color: #c82333;
}
</style>

<h2>Warehouse</h2>

<div class="card">

<form method="POST">
<input name="name" placeholder="Warehouse Name" required>
<input name="location" placeholder="Location" required>
<input name="capacity" placeholder="Capacity" required>

<br><br>

<button class="add-btn">Add Warehouse</button>
</form>

</div>

<br>

<div class="card">

<table>
<tr>
<th>ID</th>
<th>Name</th>
<th>Location</th>
<th>Capacity</th>
<th>Actions</th>
</tr>

{% for w in data %}
<tr>
<td>{{ w[0] }}</td>
<td>{{ w[1] }}</td>
<td>{{ w[2] }}</td>
<td>{{ w[3] }}</td>

<td>
    <!-- EDIT -->
    <a href="{{ url_for('edit_warehouse', id=w[0]) }}" 
       class="action-btn edit-btn">
        Edit
    </a>

    <!-- DELETE -->
    <a href="{{ url_for('delete_warehouse', id=w[0]) }}" 
       class="action-btn delete-btn"
       onclick="return confirm('Are you sure you want to delete this warehouse?')">
        Delete
    </a>
</td>

</tr>
{% endfor %}

</table>

</div>

{% endblock %}
